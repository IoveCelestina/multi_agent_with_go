version: 1

providers:
  default: deepseek
  deepseek:
    base_url: https://api.deepseek.com
    model: deepseek-chat
    api_key_env: DEEPSEEK_API_KEY
  kimi:
    base_url: https://api.moonshot.cn/v1
    model: moonshot-v1-8k
    api_key_env: KIMI_API_KEY

agents:
  researcher:
    provider: deepseek
    system_prompt: |
      You are a careful research agent. Collect concise notes and cite sources when available.
    tools:
      - read_file
  writer:
    provider: deepseek
    system_prompt: |
      You are a practical writing agent. Turn research notes into a clear final answer.
    tools: []

workflows:
  research_writer:
    coordinator: sync
    steps:
      - agent: researcher
        output: research_notes
      - agent: writer
        input: research_notes
        output: final_answer
